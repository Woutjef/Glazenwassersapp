      })),
      routes,
      opgeslagenOp: new Date().toISOString()

  } catch(e) { /* quota exceeded – silent */ }

function lsLoad() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !obj.records || !obj.clients) return null;
    return {
      records: deserializeRecords(obj.records),
      clients: obj.clients.map(c => ({
        ...c,
        laatsteWasdag: c.laatsteWasdag ? new Date(c.laatsteWasdag) : null

// ─── Hulpfuncties ─────────────────────────────────────────────────────────────
function isoWeek(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
}
function fmtDate(d) {
  if (!d) return "";
  return d.toLocaleDateString("nl-NL", { weekday:"long", day:"2-digit", month:"2-digit", year:"numeric" });
}
function fmtDateShort(d) {
  if (!d) return "";
  return d.toLocaleDateString("nl-NL", { day:"2-digit", month:"2-digit", year:"numeric" });
}
function fmtEur(n) {
  if (n == null || n === "") return "";
  const num = parseFloat(n);
  if (isNaN(num)) return "";
  return new Intl.NumberFormat("nl-NL", { style:"currency", currency:"EUR" }).format(num);
}
function datKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function calcBedragen(bedrag, btwPct, btwInbegrepen) {
  const val = parseFloat(bedrag) || 0;
  if (btwInbegrepen) {
    const factor = 1 + (btwPct / 100);
    const excl = btwPct > 0 ? Math.round((val / factor) * 100) / 100 : val;
    const btw  = Math.round((val - excl) * 100) / 100;
    return { excl, btw, incl: val };
  }
  const excl = val;
  const btw  = Math.round(excl * (btwPct / 100) * 100) / 100;
  return { excl, btw, incl: Math.round((excl + btw) * 100) / 100 };
}
function serializeRecords(records) {
  return records.map(r => ({ ...r, datum: r.datum.toISOString() }));
}
function deserializeRecords(records) {
  return records.map(r => ({ ...r, datum: new Date(r.datum) }));
}
function downloadBestand(inhoud, bestandsnaam, type) {
  const blob = new Blob([inhoud], { type });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = bestandsnaam; a.click();
  URL.revokeObjectURL(url);
}
function datumStempel() {
  const nu = new Date();
  return `${nu.getFullYear()}${String(nu.getMonth()+1).padStart(2,"0")}${String(nu.getDate()).padStart(2,"0")}_${String(nu.getHours()).padStart(2,"0")}${String(nu.getMinutes()).padStart(2,"0")}`;
}
// #4 – Hoofdletter forceren
function hoofdletter(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}
// Elke woordkapitaal + automatisch beginnen met 'Ronde '
function titelCaseRoute(s) {
  if (!s) return s;
  const woorden = s.trim().split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
  const joined = woorden.join(" ");
  if (!joined.toLowerCase().startsWith("ronde")) return "Ronde " + joined;
  return joined;
}

// #1 – Meest recente wasdag uit records bepalen voor een klant
function berekenLaatsteWasdagUitRecords(naam, records) {
  const recs = records.filter(r => r.naam === naam);
  if (!recs.length) return null;
  return recs.reduce((max, r) => r.datum > max ? r.datum : max, recs[0].datum);
}

// Bereken volgende wasdag op basis van frequentie en laatste wasdag
function berekenVolgendeWasdag(client) {
  if (!client.laatsteWasdag) return null;
  const basis = new Date(client.laatsteWasdag);
  const freq = client.frequentie || "";
  const d = new Date(basis);
  // Weken: "N week" of "N weken"
  const wekenMatch = freq.match(/^(\d+)\s*wee?k/i);
  if (wekenMatch) { d.setDate(d.getDate() + parseInt(wekenMatch[1]) * 7); return d; }
  // Maanden: "N maand" of "N maanden"
  const maandMatch = freq.match(/^(\d+)\s*maand/i);
  if (maandMatch) { d.setMonth(d.getMonth() + parseInt(maandMatch[1])); return d; }
  // Jaren: "N jaar"
  const jaarMatch = freq.match(/^(\d+)\s*jaar/i);
  if (jaarMatch) { d.setFullYear(d.getFullYear() + parseInt(jaarMatch[1])); return d; }
  // Kies datum
  if (freq === "Kies datum" && client.volgendeWasdagVrij) return new Date(client.volgendeWasdagVrij);
  return null;
}

// #11 – Duidelijker kleuronderscheid
function inplanStatus(volgende) {
  if (!volgende) return null;
  const nu = new Date(); nu.setHours(0,0,0,0);
  const v = new Date(volgende); v.setHours(0,0,0,0);
  const diff = Math.round((v - nu) / 86400000);
  if (diff < 0)   return { label:"Te laat",       kleur:C.telaatKleur,   bg:C.telaatBg,    days:diff, prioriteit:0 };
  if (diff <= 7)  return { label:"Deze week",     kleur:C.dezeweekKleur, bg:C.dezeweekBg,  days:diff, prioriteit:1 };
  if (diff <= 14) return { label:"Volgende week", kleur:"#CA6F1E",       bg:"#FDEBD0",     days:diff, prioriteit:2 };
  if (diff <= 28) return { label:"Over 2 weken",  kleur:C.green,         bg:C.greenBg,     days:diff, prioriteit:3 };
  return            { label:"Gepland",            kleur:C.primaryLight,  bg:C.dayBg,       days:diff, prioriteit:4 };
}

  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  45:"🌫️",48:"🌫️",
  51:"🌦️",53:"🌦️",55:"🌧️",

function WeerBadge({ datum }) {
  const [weer, setWeer] = useState(null);
  const dateStr = useMemo(() => {
    const d = new Date(datum); d.setHours(0,0,0,0);
    return d.toISOString().slice(0,10);
  }, [datum]);

  useEffect(() => {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${GEMERT_LAT}&longitude=${GEMERT_LON}`
      + `&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max,winddirection_10m_dominant`
      + `&current_weather=true`
      + `&timezone=Europe%2FAmsterdam&forecast_days=14`;
    fetch(url)
      .then(r=>r.json())
      .then(data=>{
        const idx = data.daily.time.indexOf(dateStr);
        const vandaagStr = new Date().toISOString().slice(0,10);
        const isVandaag = dateStr === vandaagStr;
        if (idx === -1) { setWeer(null); return; }
        setWeer({
          code: isVandaag && data.current_weather ? data.current_weather.weathercode : data.daily.weathercode[idx],
          tMax: Math.round(data.daily.temperature_2m_max[idx]),
          tMin: Math.round(data.daily.temperature_2m_min[idx]),
          tNu:  isVandaag && data.current_weather ? Math.round(data.current_weather.temperature) : null,
          windMs: Math.round((data.daily.windspeed_10m_max[idx]||0) / 3.6 * 10) / 10,
          windBft: Math.min(12, Math.round(Math.pow((data.daily.windspeed_10m_max[idx]||0)/3.6 / 0.836, 2/3))),
          windRichting: data.daily.winddirection_10m_dominant[idx],
          neerslag: data.daily.precipitation_sum[idx],
          isVandaag
        });
      })
      .catch(() => setWeer(null));
  }, [dateStr]);

  // Windrichting graden → pijlsymbool + label
  function windPijl(gr) {
    if (gr == null) return "";
    const richt = ["N","NO","O","ZO","Z","ZW","W","NW"];
    return richt[Math.round(gr / 45) % 8];
  }

  if (!weer) return (
    <div style={{display:"inline-flex",alignItems:"center",gap:3,background:"rgba(255,255,255,.12)",
      borderRadius:8,padding:"3px 8px",fontSize:11,color:"rgba(255,255,255,.5)",whiteSpace:"nowrap"}}>
      🌡️ –°
    </div>
  );
  const icoon = WEERiCOON[weer.code] || "🌡️";
  const richting = windPijl(weer.windRichting);
  return (

        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-start",lineHeight:1.15}}>

          </span>

            <span style={{color:"#FFEB3B",fontWeight:700}}>{weer.tMax}°</span>
            <span style={{margin:"0 2px",opacity:.6}}>|</span>

// ─── Datumkiezer ──────────────────────────────────────────────────────────────
function DatePicker({ value, onChange, zIndex }) {
  const [open, setOpen] = useState(false);
  const [nav, setNav]   = useState(() => { const d=value||new Date(); return {y:d.getFullYear(),m:d.getMonth()}; });
  function renderCal() {
    const {y,m} = nav;
    const first = new Date(y,m,1);
    let cur = new Date(y,m,1-(first.getDay()+6)%7);
    const last = new Date(y,m+1,0);
    const weeks = [];
    for (let w=0; w<6; w++) {
      const wk = isoWeek(new Date(cur));
      const days = [];
      for (let d=0; d<7; d++) {
        const dt = new Date(cur), inM = dt.getMonth()===m, isSel = value&&dt.toDateString()===value.toDateString();
        days.push(<td key={d} onClick={()=>{if(inM){onChange(new Date(dt));setOpen(false);}}}
          style={{padding:"5px 4px",textAlign:"center",fontSize:12,cursor:inM?"pointer":"default",
            background:isSel?C.primary:"transparent",color:isSel?"#fff":inM?C.text:C.border,borderRadius:4}}>{dt.getDate()}</td>);
        cur.setDate(cur.getDate()+1);
      }
      weeks.push(<tr key={w}><td style={{color:C.muted,fontSize:11,paddingRight:4,paddingLeft:6}}>{wk}</td>{days}</tr>);
      if (cur>last&&w>=3) break;
    }
    return weeks;
  }
  return (
    <div style={{position:"relative"}}>
      <button type="button" onClick={()=>setOpen(o=>!o)}
        style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:13,color:value?C.text:C.muted,minWidth:120}}>
        {value?fmtDate(value):"Kies datum"}
      </button>
      {open&&(
        <div style={{position:"absolute",zIndex:zIndex||999,top:34,left:0,background:C.surface,borderRadius:10,boxShadow:"0 6px 24px rgba(0,0,0,.18)",padding:12,minWidth:240}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
            <button onClick={()=>setNav(n=>{let{y,m}=n;m--;if(m<0){m=11;y--;}return{y,m};})} style={{border:"none",background:"none",cursor:"pointer",fontSize:16,color:C.primary}}>◀</button>
            <strong style={{fontSize:13}}>{MAANDEN[nav.m]} {nav.y}</strong>
            <button onClick={()=>setNav(n=>{let{y,m}=n;m++;if(m>11){m=0;y++;}return{y,m};})} style={{border:"none",background:"none",cursor:"pointer",fontSize:16,color:C.primary}}>▶</button>
          </div>
          <table style={{borderCollapse:"collapse",width:"100%"}}>
            <thead><tr><th style={{fontSize:11,color:C.muted,padding:"2px 4px"}}>Wk</th>
              {["Ma","Di","Wo","Do","Vr","Za","Zo"].map(d=><th key={d} style={{fontSize:11,color:C.muted,padding:"2px 4px"}}>{d}</th>)}
            </tr></thead>
            <tbody>{renderCal()}</tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function KlantModal({ initial, routes, clients, onSave, onAddRoute, onClose, title }) {
  function splitAdres(s) {
    if (!s) return {straat:"",huisnr:"",huisnrToev:"",postcode:"",plaats:""};
    const m = s.match(/^(.*?)\s*,\s*(\d{4}\s?[A-Z]{2})\s+(.+)$/i);
    if (m) { const st=m[1].trim(),hn=st.match(/^(.*\D)\s+(\d+\S*)$/); return {straat:hn?hn[1].trim():st,huisnr:hn?hn[2]:"",huisnrToev:"",postcode:m[2].trim(),plaats:m[3].trim()}; }
    return {straat:s,huisnr:"",huisnrToev:"",postcode:"",plaats:""};
  }
  const LEEG = {naam:"",type:"part",telefoon:"",email:"",tav:"",smsNummer:"",
    straat:"",huisnr:"",huisnrToev:"",postcode:"",plaats:"",
    frequentie:"1 maand",volgendeWasdagVrij:null,verwachteOmzet:"",commentaar:"",
    route:"",laatsteWasdag:null,klantnr:"",label:"",klantStatus:"Klant",taken:[],
    prijzenInAgenda:true,aankondigingSturen:false,vanTevorenBellen:false,zakelijkeKlant:false,factuurMeesturen:false};
  const [form,setForm] = useState(()=>{
    if(!initial) return LEEG;
    const ad=splitAdres(initial.adres||"");
    return {...LEEG,...initial,...ad,verwachteOmzet:initial.verwachteOmzet!=null?String(initial.verwachteOmzet):"",taken:initial.taken||[],klantnr:initial.klantnr||""};
  });
  const [tab,setTab]             = useState("naw");
  const [nieuweRoute,setNieuweRoute] = useState("");
  const [pcBezig,setPcBezig]     = useState(false);
  const [eigenFreq,setEigenFreq] = useState("");
  const [extraFreqs,setExtraFreqs] = useState(()=>{
    if(initial?.frequentie&&!FREQ_OPTIES_STANDAARD.includes(initial.frequentie))return[initial.frequentie];return[];
  });
  const [taakModal,setTaakModal] = useState(null);

          .then(r=>r.json()).then(data=>{
            const m=data.find(d=>d.address&&(d.address.road||d.address.pedestrian||d.address.street));

                      {taak.duurMin>0&&<span>⏱ {taak.duurMin}min</span>}

          {tab==="notitie"&&(

              <div style={{marginTop:12}}>
                <label style={lbl}>SMS/WhatsApp aankondigingsnummer</label>

            </div>

          {tab==="overig"&&(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
              <div><label style={lbl}>Klantnummer</label>
                <input value={form.klantnr||""} onChange={e=>set("klantnr",e.target.value)}
                  style={{...inp,fontFamily:"monospace",fontWeight:700,letterSpacing:1}} placeholder="Automatisch bij opslaan"/></div>
              <div><label style={lbl}>Status</label>
                <select value={form.klantStatus||"Klant"} onChange={e=>set("klantStatus",e.target.value)} style={inp}>

              <div><label style={lbl}>Label / categorie</label>
                <input value={form.label||""} onChange={e=>set("label",e.target.value)} style={inp} placeholder="bijv. VIP, Seizoen"/></div>
              <div><label style={lbl}>Route (handmatig)</label>
                <select value={form.route||""} onChange={e=>set("route",e.target.value)} style={inp}>
                  <option value="">— Geen —</option>
                  {routes.map(r=><option key={r} value={r}>{r}</option>)}</select></div>
              <div style={{gridColumn:"1/-1",background:C.bg,borderRadius:10,padding:"12px 14px"}}>
                <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:10,textTransform:"uppercase",letterSpacing:".5px"}}>Instellingen</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>

                    ["factuurMeesturen","Factuur meesturen"]].map(([k,l])=>(
                    <label key={k} style={{display:"flex",alignItems:"center",gap:7,fontSize:12,cursor:"pointer",padding:"3px 0"}}>
                      <input type="checkbox" checked={!!form[k]} onChange={e=>set(k,e.target.checked)} style={{accentColor:C.primary,width:14,height:14}}/>{l}</label>

                </div>

          )}
        </div>
        {/* Footer */}
        <div style={{padding:"12px 22px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10,justifyContent:"flex-end",background:"#F8FAFD",borderRadius:"0 0 14px 14px"}}>
          <button onClick={onClose} style={btnOutline}>Annuleren</button>
          <button onClick={()=>{
            if(!form.naam.trim())return;
            const adres=adresVolledig||[form.straat,form.huisnr,form.postcode,form.plaats].filter(Boolean).join(" ");
            const klantnr=form.klantnr||maakKlantNr(clients);
            onSave({...form,adres,klantnr,verwachteOmzet:parseFloat(form.verwachteOmzet)||0});

      </div>
      {taakModal&&<TaakForm taak={taakModal.taak} onSave={saveTaak}
        onDelete={taakModal.idx!==null?()=>deleteTaak(taakModal.idx):null}
        onClose={()=>setTaakModal(null)}/>}
    </div>
  );
}

// ─── Route beheren modal – met klant-wizard na bewerken/verwijderen ──────────
function RouteBeherenModal({ routes, clients, onRenameRoute, onDeleteRoute, onClose }) {
  const [editNaam, setEditNaam]     = useState({});
  const [zoek, setZoek]             = useState("");
  const [uitgebreid, setUitgebreid] = useState({});
  const [wizard, setWizard]         = useState(null);

  function klanten(r) { return clients.filter(c=>c.route===r); }
  const gefilterd = routes.filter(r => !zoek || r.toLowerCase().includes(zoek.toLowerCase()));

  function startEdit(r) { setEditNaam(m=>({...m,[r]:r})); }

  function openWizard(actie, oudeRoute, nieuweNaam) {
    const betrokken = klanten(oudeRoute);
    if (betrokken.length === 0) {
      if (actie==="wijzig") onRenameRoute(oudeRoute, nieuweNaam, {}, []);
      else onDeleteRoute(oudeRoute, {}, []);
    } else {
      const keuzes = {};
      betrokken.forEach(c => { keuzes[c.naam] = actie==="wijzig" ? nieuweNaam : ""; });
      setWizard({ actie, oudeRoute, nieuweNaam, klanten:betrokken, keuzes, nieuweRondeNamen:{} });
    }
  }

  function handleWijzig(r) {
    const nieuw = titelCaseRoute(editNaam[r]||r);
    setEditNaam(m=>{const n={...m};delete n[r];return n;});
    if (!nieuw || nieuw===r) return;
    openWizard("wijzig", r, nieuw);
  }
  function handleVerwijder(r) { openWizard("verwijder", r, null); }

  function wizardOpslaan() {
    if (!wizard) return;
    const nieuweRondes = [];
    const definitief = {};
    wizard.klanten.forEach(c => {
      const keuze = wizard.keuzes[c.naam];
      if (keuze === "nieuw") {
        const naamNieuw = titelCaseRoute(wizard.nieuweRondeNamen[c.naam]||"") || "";
        definitief[c.naam] = naamNieuw;
        if (naamNieuw && !nieuweRondes.includes(naamNieuw)) nieuweRondes.push(naamNieuw);
      } else {
        definitief[c.naam] = keuze;
      }
    });
    if (wizard.actie === "wijzig") onRenameRoute(wizard.oudeRoute, wizard.nieuweNaam, definitief, nieuweRondes);
    else onDeleteRoute(wizard.oudeRoute, definitief, nieuweRondes);
    setWizard(null);
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1300}}>
      <div style={{background:C.surface,borderRadius:14,padding:28,width:540,boxShadow:"0 10px 40px rgba(0,0,0,.25)",maxHeight:"88vh",overflowY:"auto"}}>
        <h3 style={{margin:"0 0 14px",color:C.primary,fontSize:17}}>📍 Routes beheren</h3>
        <input value={zoek} onChange={e=>setZoek(e.target.value)} placeholder="🔍 Zoek ronde..." style={{...inp,marginBottom:14}}/>
        {gefilterd.length===0 && <div style={{color:C.muted,fontSize:13}}>Geen routes gevonden.</div>}
        {gefilterd.map(r => {
          const cList = klanten(r);
          const open  = uitgebreid[r];
          return (
            <div key={r} style={{borderBottom:`1px solid ${C.border}`,paddingBottom:8,marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8,paddingTop:4}}>
                {editNaam[r]!==undefined ? (
                  <input value={editNaam[r]} onChange={e=>setEditNaam(m=>({...m,[r]:e.target.value}))}
                    style={{...inp,flex:1}} onKeyDown={e=>e.key==="Enter"&&handleWijzig(r)} autoFocus/>
                ) : (
                  <span style={{flex:1,fontSize:13,fontWeight:600}}>{r}</span>
                )}
                <button onClick={()=>setUitgebreid(u=>({...u,[r]:!u[r]}))}
                  style={{background:open?C.dayBg:"#F0F3F4",border:"none",borderRadius:6,cursor:"pointer",
                    fontSize:11,color:C.primaryLight,padding:"3px 8px",fontWeight:600,whiteSpace:"nowrap"}}>
                  👥 {cList.length} {open?"▲":"▼"}
                </button>
                {editNaam[r]!==undefined ? (
                  <>
                    <button onClick={()=>handleWijzig(r)} style={{...btnPrimary,padding:"4px 10px",fontSize:12}}>✔ Opslaan</button>
                    <button onClick={()=>setEditNaam(m=>{const n={...m};delete n[r];return n;})} style={{...btnOutline,padding:"4px 10px",fontSize:12}}>✕</button>
                  </>
                ) : (
                  <>
                    <button onClick={()=>startEdit(r)} style={{border:"none",background:"#EBF5FB",color:C.primaryLight,borderRadius:6,cursor:"pointer",padding:"4px 8px",fontSize:12}}>✏️ Bewerken</button>
                    <button onClick={()=>handleVerwijder(r)} style={{border:"none",background:"#FDEDEC",color:C.danger,borderRadius:6,cursor:"pointer",padding:"4px 8px",fontSize:12}}>🗑 Verwijderen</button>
                  </>
                )}
              </div>
              {open && (
                <div style={{marginTop:6,marginLeft:8,background:C.bg,borderRadius:8,padding:"6px 10px"}}>
                  {cList.length===0
                    ? <div style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>Geen klanten gekoppeld.</div>
                    : cList.map(c=>(
                      <div key={c.naam} style={{display:"flex",gap:6,padding:"3px 0",borderBottom:`1px solid ${C.border}`,fontSize:12}}>
                        <span style={{color:c.type==="org"?C.orgBlue:C.text,fontWeight:500}}>{c.naam}</span>
                        <span style={{fontSize:10,color:C.muted,marginLeft:"auto"}}>{c.frequentie||""}</span>
                      </div>
                    ))
                  }
                </div>
              )}
            </div>
          );
        })}
        <div style={{marginTop:20,display:"flex",justifyContent:"flex-end"}}>
          <button onClick={onClose} style={btnOutline}>Sluiten</button>
        </div>
      </div>

      {wizard && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1600}}>
          <div style={{background:C.surface,borderRadius:14,padding:28,width:520,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 12px 48px rgba(0,0,0,.35)"}}>
            <div style={{textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:28}}>{wizard.actie==="verwijder"?"🗑️":"✏️"}</div>
              <h3 style={{margin:"6px 0 4px",color:C.primary,fontSize:16}}>
                {wizard.actie==="wijzig"
                  ? <span>Ronde hernoemd naar <em>{wizard.nieuweNaam}</em></span>
                  : <span>Ronde <em>{wizard.oudeRoute}</em> verwijderd</span>}
              </h3>
              <p style={{fontSize:13,color:C.muted,margin:0,lineHeight:1.5}}>
                Kies per klant de nieuwe ronde, maak een nieuwe ronde aan, of wijs geen toe.
              </p>
            </div>
            {wizard.klanten.map(c => {
              const keuze = wizard.keuzes[c.naam];
              const overige = routes.filter(r=>r!==wizard.oudeRoute);
              return (
                <div key={c.naam} style={{background:C.bg,borderRadius:10,padding:"12px 14px",marginBottom:10,border:`1px solid ${C.border}`}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:8,color:C.primary}}>
                    👤 {c.naam}
                    <span style={{marginLeft:8,fontSize:11,color:C.muted,fontWeight:400}}>{c.type==="org"?"Organisatie":"Particulier"}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {overige.map(r=>(
                      <label key={r} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,
                        padding:"5px 8px",borderRadius:6,
                        background:keuze===r?"#EBF5FB":"transparent",
                        border:keuze===r?`1px solid ${C.primaryLight}`:"1px solid transparent"}}>
                        <input type="radio" name={"route_"+c.naam} checked={keuze===r}
                          onChange={()=>setWizard(w=>({...w,keuzes:{...w.keuzes,[c.naam]:r}}))}/>
                        📍 {r}
                      </label>
                    ))}
                    <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,
                      padding:"5px 8px",borderRadius:6,flexWrap:"wrap",
                      background:keuze==="nieuw"?"#F9FBE7":"transparent",
                      border:keuze==="nieuw"?"1px solid #8BC34A":"1px solid transparent"}}>
                      <input type="radio" name={"route_"+c.naam} checked={keuze==="nieuw"}
                        onChange={()=>setWizard(w=>({...w,keuzes:{...w.keuzes,[c.naam]:"nieuw"}}))}/>
                      <span>✨ Nieuwe ronde aanmaken</span>
                      {keuze==="nieuw" && (
                        <input value={wizard.nieuweRondeNamen[c.naam]||""}
                          autoFocus
                          onChange={e=>setWizard(w=>({...w,nieuweRondeNamen:{...w.nieuweRondeNamen,[c.naam]:e.target.value}}))}
                          style={{...inp,flex:1,minWidth:140,padding:"3px 8px",fontSize:12}}
                          placeholder="bijv. Ronde Veghel"/>
                      )}
                    </label>
                    <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,
                      padding:"5px 8px",borderRadius:6,
                      background:keuze===""?"#FDEDEC":"transparent",
                      border:keuze===""?`1px solid ${C.danger}`:"1px solid transparent"}}>
                      <input type="radio" name={"route_"+c.naam} checked={keuze===""}
                        onChange={()=>setWizard(w=>({...w,keuzes:{...w.keuzes,[c.naam]:""}}))}/>
                      ✖ Geen route toewijzen
                    </label>
                  </div>
                </div>
              );
            })}
            <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:16}}>
              <button onClick={()=>setWizard(null)} style={btnOutline}>Annuleren</button>
              <button onClick={wizardOpslaan} style={btnPrimary}>✔ Opslaan & doorvoeren</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ─── Klant detail popup (dubbelklik) ─────────────────────────────────────────
function KlantDetailModal({ client, record, records, onClose, onEdit }) {
  if (!client) return null;
  const volgende = berekenVolgendeWasdag(client);
  const status = volgende ? inplanStatus(volgende) : null;
  const cRecs = records.filter(r=>r.naam===client.naam).sort((a,b)=>b.datum-a.datum);
  const totaalOmzet = cRecs.reduce((s,r)=>s+calcBedragen(r.bedrag,r.btwPct,BTW_INBEGREPEN_WIJZEN.includes(r.betaalwijze)).incl,0);
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1600}}>
      <div style={{background:C.surface,borderRadius:14,padding:28,width:480,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 10px 40px rgba(0,0,0,.28)"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
          <div>
            <h3 style={{margin:0,color:C.primary,fontSize:18}}>{client.naam}</h3>
            <div style={{fontSize:12,color:C.muted,marginTop:2}}>{client.type==="org"?"Organisatie":"Particulier"}{client.route&&` · 📍 ${client.route}`}</div>
          </div>

// ─── Record formulier ─────────────────────────────────────────────────────────
function RecordForm({ clients, initial, onSave, onClose, title, onUpdateClientFreq }) {
  const [form, setForm] = useState(() => initial
    ? { ...initial, bedrag: initial.bedrag===0?"":String(initial.bedrag) }
    : { naam:"", datum:new Date(), betaalwijze:"Factuur", betaald:false, btwPct:21, bedrag:"", status:"" }
  );
  const [showFreqModal, setShowFreqModal] = useState(false);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  function handleBetaalwijze(bw) {
    setForm(f=>({...f, betaalwijze:bw, betaald:AUTO_BETAALD_WIJZEN.includes(bw)?true:false}));
  }

  const btwInbegrepen = BTW_INBEGREPEN_WIJZEN.includes(form.betaalwijze);
  const bedragNum = parseFloat(form.bedrag)||0;
  const {excl,btw,incl} = calcBedragen(bedragNum, form.btwPct, btwInbegrepen);
  const isAuto = AUTO_BETAALD_WIJZEN.includes(form.betaalwijze);
  const gekozenClient = clients.find(c=>c.naam===form.naam);

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
      <div style={{background:C.surface,borderRadius:14,padding:28,width:480,boxShadow:"0 10px 40px rgba(0,0,0,.25)",maxHeight:"92vh",overflowY:"auto"}}>
        <h3 style={{margin:"0 0 20px",color:C.primary,fontSize:17}}>{title}</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div style={{gridColumn:"1/-1"}}>
            <label style={lbl}>Klant</label>
            <select value={form.naam} onChange={e=>{
              const n = e.target.value;
              const c = clients.find(x=>x.naam===n);
              const isOrg = c && c.type==="org";
              setForm(f=>({...f, naam:n,
                bedrag: c && c.verwachteOmzet ? String(c.verwachteOmzet) : f.bedrag,
                betaalwijze: n ? (isOrg?"Factuur":"Contant") : f.betaalwijze,
                betaald: n && !isOrg ? true : false
              }));
            }} style={inp}>
              <option value="">— Kies klant —</option>
              {[...clients].sort((a,b)=>a.naam.localeCompare(b.naam,"nl")).map(c=>(
                <option key={c.naam} value={c.naam}>{c.naam}{c.type==="org"?" (org)":" (part)"}</option>
              ))}
            </select>
          </div>

          {/* #9 – Frequentie tonen + aanpassen */}
          {gekozenClient && (
            <div style={{gridColumn:"1/-1",background:"#EBF5FB",borderRadius:8,padding:"10px 14px",fontSize:12}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{color:C.muted}}>Frequentie: <strong style={{color:C.primary,marginLeft:4}}>{gekozenClient.frequentie}</strong>
                  {gekozenClient.frequentie==="Kies datum" && gekozenClient.volgendeWasdagVrij &&
                    <span style={{marginLeft:6}}>({fmtDateShort(new Date(gekozenClient.volgendeWasdagVrij))})</span>}
                </span>
                {onUpdateClientFreq && <button onClick={()=>setShowFreqModal(true)} style={{...btnOutline,padding:"3px 10px",fontSize:11}}>✏️ Aanpassen</button>}
              </div>
              {gekozenClient.commentaar && <div style={{marginTop:4,color:C.muted,fontStyle:"italic"}}>💬 {gekozenClient.commentaar}</div>}
              {gekozenClient.route && <div style={{marginTop:2,color:C.primaryLight,fontSize:11}}>📍 {gekozenClient.route}</div>}
            </div>
          )}

          <div><label style={lbl}>Datum</label><DatePicker value={form.datum} onChange={v=>set("datum",v)}/></div>
          <div>
            <label style={lbl}>Betaalwijze</label>
            <select value={form.betaalwijze} onChange={e=>handleBetaalwijze(e.target.value)} style={inp}>
              <option>Factuur</option><option>Contant</option><option>Betaalverzoek</option>
            </select>
          </div>
          <div>
            <label style={lbl}>Bedrag {btwInbegrepen?"(incl. BTW)":"(excl. BTW)"}</label>
            <input type="number" min="0" step="0.01" value={form.bedrag} onChange={e=>set("bedrag",e.target.value)} style={inp} placeholder="0.00"/>
          </div>
          <div>
            <label style={lbl}>BTW %</label>
            <select value={form.btwPct} onChange={e=>set("btwPct",parseInt(e.target.value))} style={inp}>
              <option value={0}>0%</option><option value={21}>21%</option>
            </select>
          </div>
          {/* betaald wordt via Snelstart bijgehouden */}
        </div>
        {btwInbegrepen&&<div style={{background:"#EBF5FB",borderRadius:8,padding:"8px 12px",marginTop:12,fontSize:12,color:C.primaryLight}}>💡 Bij <strong>{form.betaalwijze}</strong> is het bedrag inclusief BTW.</div>}
        <div style={{background:C.sumBg,borderRadius:8,padding:"10px 14px",marginTop:12,fontSize:13,display:"grid",gridTemplateColumns:"1fr auto",gap:"2px 16px"}}>
          <span style={{color:C.muted}}>Excl. BTW</span><span>{fmtEur(excl)}</span>
          <span style={{color:C.muted}}>BTW ({form.btwPct}%)</span><span>{fmtEur(btw)}</span>
          <span style={{fontWeight:700}}>Incl. BTW</span><span style={{fontWeight:700}}>{fmtEur(incl)}</span>

        {/* ── Snelstart velden (alleen bij Factuur) ── */}
        {form.betaalwijze==="Factuur"&&(
          <div style={{background:"#F0F3FF",border:"1.5px solid #B0BFF8",borderRadius:10,padding:"12px 14px",marginTop:12}}>
            <div style={{fontSize:11,fontWeight:700,color:"#3949AB",marginBottom:8}}>🔗 Snelstart koppeling</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div>
                <label style={{...lbl,color:"#3949AB"}}>Factuurnummer (uit Snelstart)</label>
                <input type="text" value={form.snelstartFactuurNr||""} onChange={e=>set("snelstartFactuurNr",e.target.value)}
                  style={{...inp,fontFamily:"monospace"}} placeholder="bijv. 2025-0042"/>
              </div>
              <div>
                <label style={{...lbl,color:"#3949AB"}}>Status in Snelstart</label>
                <select value={form.snelstartStatus||"—"} onChange={e=>set("snelstartStatus",e.target.value)} style={inp}>
                  {SNELSTART_STATUSSEN.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
            </div>
            {form.snelstartSyncDatum&&<div style={{fontSize:10,color:"#7986CB",marginTop:6}}>Laatste update: {new Date(form.snelstartSyncDatum).toLocaleString("nl-NL")}</div>}
          </div>
        )}
        <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
          <button onClick={onClose} style={btnOutline}>Annuleren</button>
          <button onClick={()=>{ if(!form.naam)return; onSave({...form,bedrag:bedragNum,betaald:isAuto?true:form.betaald,status:form.status||"",snelstartSyncDatum:form.snelstartStatus&&form.snelstartStatus!=="—"?form.snelstartSyncDatum||new Date().toISOString():form.snelstartSyncDatum}); }}
            style={{...btnPrimary,opacity:form.naam?1:0.5}} disabled={!form.naam}>Opslaan</button>
        </div>
      </div>

      {/* #9 – Frequentie modal */}
      {showFreqModal && gekozenClient && (
        <FreqModal
          clientNaam={gekozenClient.naam}
          huidigeFreq={gekozenClient.frequentie}
          huidigeVrijDatum={gekozenClient.volgendeWasdagVrij}
          onSave={(nieuweFreq, vrijDatum) => {
            onUpdateClientFreq(gekozenClient.naam, nieuweFreq, vrijDatum);
            setShowFreqModal(false);
          }}
          onClose={()=>setShowFreqModal(false)}
        />
      )}
    </div>
  );
}

function snelstartBadgeStijl(status) {
  if (status==="Betaald")    return { bg:"#D5F5E3", color:"#1E8449" };
  if (status==="Verstuurd")  return { bg:"#EBF5FB", color:"#2E86C1" };

  return { bg:"#F0F3F4", color:"#7F8C8D" };
}

const UREN = ["07:00","08:00","09:00","10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00"];

function getWeekDates(refDate) {
  const now = new Date(refDate); now.setHours(0,0,0,0);
  const day = now.getDay() || 7;
  const mon = new Date(now);
  mon.setDate(now.getDate() - day + 1);
  return Array.from({length:7}, (_,i) => { const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

// #10 – helper om verwachte omzet op een afspraakblok te tonen
function AfspraakBlok({ r, clientMap, onEdit, onDelete, onDubbelklik, onMoveRecord, compact, toonUur }) {
  const c = clientMap[r.naam]||{};
  const {incl} = calcBedragen(r.bedrag,r.btwPct,BTW_INBEGREPEN_WIJZEN.includes(r.betaalwijze));
  const verwacht = c.verwachteOmzet > 0 ? c.verwachteOmzet : null;
  const kleurBg  = r.status==="bevestigd"?C.greenBg:r.status==="voorstel"?C.yellowBg:"#EBF5FB";
  const kleurRand = r.status==="bevestigd"?C.green:r.status==="voorstel"?C.yellow:C.primaryLight;
  const kleurText = c.type==="org"?C.orgBlue:C.primaryLight;
  const uurLabel = toonUur && r.datum instanceof Date && r.datum.getHours() > 0
    ? `${String(r.datum.getHours()).padStart(2,"0")}:00 ` : "";

  function handleDragStart(e) {
    e.dataTransfer.setData("text/plain", "rec:" + r.id);
    e.stopPropagation();
  }

  if (compact) {
    return (
      <div
        draggable
        onDragStart={handleDragStart}
        onDoubleClick={()=>onDubbelklik&&onDubbelklik(r)}
        style={{background:kleurBg,border:`1px solid ${kleurRand}`,borderRadius:3,padding:"2px 5px",
          fontSize:10,fontWeight:600,marginBottom:1,display:"flex",alignItems:"center",justifyContent:"space-between",gap:2,
          cursor:"grab"}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:kleurText,flex:1}}>
          {uurLabel}{r.naam}
        </span>
        <div style={{display:"flex",alignItems:"center",gap:2,flexShrink:0}}>
          {verwacht&&<span style={{fontSize:9,color:C.accent}}>{fmtEur(verwacht)}</span>}
          <button onClick={e=>{e.stopPropagation();onEdit(r);}} title="Bewerken"
            style={{border:"none",background:"none",cursor:"pointer",color:kleurText,fontSize:9,padding:"0 1px",lineHeight:1}}>✏️</button>
          <button onClick={e=>{e.stopPropagation();onDelete(r.id);}} title="Verwijderen"
            style={{border:"none",background:"none",cursor:"pointer",color:C.danger,fontSize:9,padding:"0 1px",lineHeight:1}}>✕</button>
        </div>
      </div>
    );
  }

  // Week/dag view
  return (
    <div
      draggable
      onDragStart={handleDragStart}
      onDoubleClick={()=>onDubbelklik&&onDubbelklik(r)}
      style={{background:kleurRand,color:"#fff",borderRadius:5,padding:"3px 6px",fontSize:11,fontWeight:600,
        marginBottom:2,boxShadow:"0 1px 3px rgba(0,0,0,.15)",display:"flex",flexDirection:"column",gap:1,
        cursor:"grab"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
        <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {uurLabel}{r.naam}
        </span>
        <div style={{display:"flex",gap:2,flexShrink:0}}>
          <button onClick={e=>{e.stopPropagation();onEdit(r);}} title="Bewerken" style={{border:"none",background:"rgba(255,255,255,.3)",cursor:"pointer",borderRadius:3,padding:"1px 3px",fontSize:10,color:"#fff"}}>✏️</button>
          <button onClick={e=>{e.stopPropagation();onDelete(r.id);}} title="Verwijderen" style={{border:"none",background:"rgba(255,255,255,.3)",cursor:"pointer",borderRadius:3,padding:"1px 3px",fontSize:10,color:"#fff"}}>✕</button>
        </div>
      </div>
      {verwacht && <span style={{fontSize:9,opacity:.9}}>💰 {fmtEur(verwacht)}</span>}
    </div>
  );
}

function PlanningTab({ records, clients, dagOffset, onDagOffsetChange, onEditRecord, onDeleteRecord, onNieuwRecord, planView, onPlanViewChange, onDropRecord, onDubbelklik }) {
  const vandaagBase = useMemo(() => { const d=new Date(); d.setHours(0,0,0,0); return d; }, []);
  // #6 – dagview navigatie: dagOffset bepaalt welke dag
  const activeDay = useMemo(() => {
    const d = new Date(vandaagBase); d.setDate(d.getDate() + dagOffset); return d;
  }, [vandaagBase, dagOffset]);
  const weekDates = useMemo(() => getWeekDates(activeDay), [activeDay]);
  const vandaagStr = vandaagBase.toDateString();
  const clientMap = useMemo(() => { const m={}; clients.forEach(c=>m[c.naam]=c); return m; }, [clients]);

  const recPerDag = useMemo(() => {
    const map = {};
    records.forEach(r => {
      const k = datKey(r.datum);
      if (!map[k]) map[k] = [];
      map[k].push(r);
    });
    return map;
  }, [records]);

  function dagOmzet(d) {
    const k = datKey(d);
    const recs = recPerDag[k] || [];
    return recs.reduce((s,r) => s + calcBedragen(r.bedrag,r.btwPct,BTW_INBEGREPEN_WIJZEN.includes(r.betaalwijze)).incl, 0);
  }

  const [maandNav, setMaandNav] = useState(() => { const n=new Date(); return {y:n.getFullYear(),m:n.getMonth()}; });
  const [dragOverKey, setDragOverKey] = useState(null);
  const [dragOverUur, setDragOverUur] = useState(null);

  function handleDragOver(e, k, uur) {
    e.preventDefault();
    setDragOverKey(k);
    if (uur != null) setDragOverUur(uur);
  }
  function handleDrop(e, datum, uur) {
    e.preventDefault();
    setDragOverKey(null);
    setDragOverUur(null);
    const data = e.dataTransfer.getData("text/plain");
    if (!data) return;
    if (data.startsWith("rec:")) {
      const id = parseInt(data.slice(4));
      onDropRecord(null, datum, id, uur ?? null);
    } else {
      onDropRecord(data, datum, null, uur ?? null);
    }
  }

  // ── Week view ──
  function WeekView() {
    return (
      <div style={{overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
          <thead>
            <tr>
              <th style={{width:52,padding:"6px 8px",fontSize:11,color:C.muted,borderBottom:`1px solid ${C.border}`}}></th>
              {weekDates.map((d,i) => {
                const isV = d.toDateString()===vandaagStr;
                const omz = dagOmzet(d);
                const k = datKey(d);
                return (
                  <th key={i}
                    onDragOver={e=>handleDragOver(e,k,null)}
                    onDragLeave={()=>{ setDragOverKey(null); setDragOverUur(null); }}
                    onDrop={e=>handleDrop(e,d,null)}
                    style={{padding:"6px 4px",textAlign:"center",fontWeight:isV?800:500,
                      color:isV?C.primary:C.text,
                      background:dragOverKey===k&&dragOverUur===null?"#D5F5E3":isV?"#EBF5FB":"transparent",
                      borderBottom:`2px solid ${isV?C.primary:C.border}`,
                      outline:dragOverKey===k&&dragOverUur===null?"2px dashed "+C.green:"none",
                      transition:"background .15s"}}>
                    <div style={{fontSize:11}}>{WEEKDAGEN_KORT[i]}</div>
                    <div style={{fontSize:18,fontWeight:800}}>{d.getDate()}</div>
                    {omz>0 && <div style={{fontSize:10,color:C.accent,fontWeight:700}}>{fmtEur(omz)}</div>}
                    <WeerBadge datum={d}/>
                  </th>
                );
              })}
            </tr>
          </thead>
          <tbody>
            {UREN.map((uur,ui) => {
              const uurInt = parseInt(uur);
              return (
                <tr key={uur} style={{background:ui%2===0?"#FAFBFC":"white"}}>
                  <td style={{padding:"4px 8px",fontSize:11,color:C.muted,textAlign:"right",
                    borderRight:`1px solid ${C.border}`,verticalAlign:"top",userSelect:"none"}}>{uur}</td>
                  {weekDates.map((d,di) => {
                    const k = datKey(d);
                    const slotKey = k + "_" + uurInt;
                    const dagRecs = recPerDag[k]||[];
                    // Toon records waarvan het uur overeenkomt, of (voor 07:00) records zonder uur
                    const recs = dagRecs.filter(r => {
                      const h = r.datum instanceof Date ? r.datum.getHours() : 0;
                      return h === uurInt || (uurInt === 7 && h === 0);
                    });
                    const isOver = dragOverKey===k && dragOverUur===uurInt;
                    return (
                      <td key={di}
                        onDragOver={e=>handleDragOver(e,k,uurInt)}
                        onDragLeave={()=>{ setDragOverKey(null); setDragOverUur(null); }}
                        onDrop={e=>handleDrop(e,d,uurInt)}
                        style={{padding:2,verticalAlign:"top",borderLeft:`1px solid ${C.border}22`,minHeight:36,
                          background:isOver?"rgba(30,132,73,.13)":"transparent",
                          outline:isOver?`2px dashed ${C.green}`:"none",
                          transition:"background .1s"}}>
                        {recs.map(r=>(
                          <AfspraakBlok key={r.id} r={r} clientMap={clientMap}
                            onEdit={onEditRecord} onDelete={onDeleteRecord} onDubbelklik={onDubbelklik} toonUur/>
                        ))}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  }

  // #6 – Dag view met tijdslots voor slepen naar tijdstip
  function DagView() {
    const k = datKey(activeDay);
    const dagRecs = recPerDag[k]||[];
    const totaal = dagRecs.reduce((s,r)=>s+calcBedragen(r.bedrag,r.btwPct,BTW_INBEGREPEN_WIJZEN.includes(r.betaalwijze)).incl,0);
    return (
      <div style={{background:C.surface,borderRadius:12,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,.07)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <h3 style={{margin:0,color:C.primary,fontSize:16}}>{fmtDate(activeDay)}</h3>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {totaal>0 && <div style={{background:C.greenBg,borderRadius:8,padding:"4px 12px",fontSize:13,fontWeight:700,color:C.green}}>💰 {fmtEur(totaal)}</div>}
            <WeerBadge datum={activeDay}/>
          </div>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <tbody>
            {UREN.map((uur,ui) => {
              const uurInt = parseInt(uur);
              const recs = dagRecs.filter(r => {
                const h = r.datum instanceof Date ? r.datum.getHours() : 0;
                return h === uurInt || (uurInt === 7 && h === 0);
              });
              const isOver = dragOverKey===k && dragOverUur===uurInt;
              return (
                <tr key={uur} style={{background:ui%2===0?"#FAFBFC":"white"}}>
                  <td style={{width:52,padding:"6px 8px",fontSize:11,color:C.muted,textAlign:"right",
                    borderRight:`1px solid ${C.border}`,verticalAlign:"top",userSelect:"none"}}>{uur}</td>
                  <td
                    onDragOver={e=>handleDragOver(e,k,uurInt)}
                    onDragLeave={()=>{ setDragOverKey(null); setDragOverUur(null); }}
                    onDrop={e=>handleDrop(e,activeDay,uurInt)}
                    style={{padding:4,verticalAlign:"top",minHeight:38,
                      background:isOver?"rgba(30,132,73,.12)":"transparent",
                      outline:isOver?`2px dashed ${C.green}`:"none",
                      transition:"background .1s"}}>
                    {isOver && recs.length===0 && (
                      <div style={{fontSize:11,color:C.green,fontStyle:"italic",padding:"2px 4px"}}>📅 Loslaten om hier in te plannen</div>
                    )}
                    {recs.map(r => {
                      const {incl} = calcBedragen(r.bedrag,r.btwPct,BTW_INBEGREPEN_WIJZEN.includes(r.betaalwijze));
                      const c = clientMap[r.naam]||{};
                      const verwacht = c.verwachteOmzet > 0 ? c.verwachteOmzet : null;
                      return (
                        <div key={r.id}
                          draggable
                          onDragStart={e=>{e.dataTransfer.setData("text/plain","rec:"+r.id);}}
                          onDoubleClick={()=>onDubbelklik&&onDubbelklik(r)}
                          style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderRadius:8,
                            marginBottom:4,background:r.status==="bevestigd"?C.greenBg:r.status==="voorstel"?C.yellowBg:C.dayBg,
                            border:`1px solid ${r.status==="bevestigd"?C.green:r.status==="voorstel"?C.yellow:C.primaryLight}`,
                            cursor:"grab"}}>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:600,fontSize:13}}>{r.naam}</div>
                            <div style={{fontSize:11,color:C.muted}}>{r.betaalwijze} · {fmtEur(incl)}{verwacht&&incl!==verwacht?<span style={{marginLeft:6,color:C.accent}}>verwacht: {fmtEur(verwacht)}</span>:""}</div>
                          </div>
                          <div style={{display:"flex",gap:4}}>
                            <button onClick={()=>onEditRecord(r)} style={{...btnOutline,padding:"3px 8px",fontSize:11}}>✏️</button>
                            <button onClick={()=>onDeleteRecord(r.id)} style={{...btnDanger,padding:"3px 8px",fontSize:11}}>✕</button>
                          </div>
                        </div>
                      );
                    })}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  }

  // ── Maand view ──
  function MaandView() {
    const {y,m} = maandNav;
    const eersteVdMaand = new Date(y,m,1);
    const startDag = new Date(y,m,1-(eersteVdMaand.getDay()+6)%7);
    const cellen = [];
    const d = new Date(startDag);
    for (let i=0;i<42;i++) { cellen.push(new Date(d)); d.setDate(d.getDate()+1); }

    return (
      <div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setMaandNav(n=>{let{y,m}=n;m--;if(m<0){m=11;y--;}return{y,m};})} style={{...btnOutline,padding:"5px 12px"}}>◀</button>
            <span style={{fontWeight:700,fontSize:15,color:C.primary,minWidth:140,textAlign:"center"}}>{MAANDEN[m]} {y}</span>
            <button onClick={()=>setMaandNav(n=>{let{y,m}=n;m++;if(m>11){m=0;y++;}return{y,m};})} style={{...btnOutline,padding:"5px 12px"}}>▶</button>
            <button onClick={()=>{ const nu=new Date(); setMaandNav({y:nu.getFullYear(),m:nu.getMonth()}); }} style={{...btnOutline,padding:"4px 8px",fontSize:11}}>Vandaag</button>
          </div>
        </div>
        <table style={{width:"100%",borderCollapse:"collapse"}}>
          <thead>
            <tr>{WEEKDAGEN_KORT.map(wk=><th key={wk} style={{padding:"8px 4px",textAlign:"center",fontSize:12,color:C.muted,fontWeight:600,borderBottom:`1px solid ${C.border}`}}>{wk}</th>)}</tr>
          </thead>
          <tbody>
            {Array.from({length:6},(_,ri)=>(
              <tr key={ri}>
                {cellen.slice(ri*7,ri*7+7).map((dag,ci)=>{
                  const inMaand = dag.getMonth()===m;
                  const isV = dag.toDateString()===vandaagStr;
                  const k = datKey(dag);
                  const dagRecs = recPerDag[k]||[];
                  const omz = dagRecs.reduce((s,r)=>s+calcBedragen(r.bedrag,r.btwPct,BTW_INBEGREPEN_WIJZEN.includes(r.betaalwijze)).incl,0);
                  return (
                    <td key={ci}
                      onDragOver={e=>{if(inMaand)handleDragOver(e,k);}}
                      onDragLeave={()=>setDragOverKey(null)}
                      onDrop={e=>{if(inMaand)handleDrop(e,dag);}}
                      style={{border:`1px solid ${dragOverKey===k?C.green:C.border}`,padding:4,verticalAlign:"top",height:100,
                        background:dragOverKey===k?"#D5F5E3":isV?"#EBF5FB":inMaand?C.surface:"#F8F9FA",
                        opacity:inMaand?1:0.5,transition:"background .15s"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                        <span style={{fontSize:12,fontWeight:isV?800:400,
                          background:isV?C.primary:"transparent",color:isV?"#fff":inMaand?C.text:C.muted,
                          borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center"}}>{dag.getDate()}</span>
                        {omz>0&&<span style={{fontSize:9,color:C.accent,fontWeight:700}}>{fmtEur(omz)}</span>}
                      </div>
                      {dagRecs.slice(0,2).map(r=>(
                        <AfspraakBlok key={r.id} r={r} clientMap={clientMap} onEdit={onEditRecord} onDelete={onDeleteRecord} onDubbelklik={onDubbelklik} compact/>
                      ))}
                      {dagRecs.length>2&&<div style={{fontSize:9,color:C.muted}}>+{dagRecs.length-2} meer</div>}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  }

  // ── Inplannen zijpanel (links) ──
  const inTeplannen = useMemo(() => {
    return clients
      .map(c => {
        const volgende = berekenVolgendeWasdag(c);
        if (!volgende) return null;
        const status = inplanStatus(volgende);
        return { client:c, volgende, status };
      })
      .filter(x => x && x.status && x.status.label !== "Gepland")
      .sort((a,b) => a.status.prioriteit - b.status.prioriteit || a.status.days - b.status.days);
  }, [clients]);

  // #7 – zoekveld klant
  const [klantZoekPlan, setKlantZoekPlan] = useState("");
  const gefilterdeInteplannen = useMemo(() => {
    if (!klantZoekPlan) return inTeplannen;
    return inTeplannen.filter(x=>x.client.naam.toLowerCase().includes(klantZoekPlan.toLowerCase()));
  }, [inTeplannen, klantZoekPlan]);

  return (
    // #3 – inplannen LINKS, kalender rechts
    <div style={{display:"grid",gridTemplateColumns:"240px 1fr",gap:16,alignItems:"start"}}>

      {/* Inplannen zijpanel */}
      <div style={{background:C.surface,borderRadius:14,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,.07)"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.primary,marginBottom:8}}>📋 Inplannen</div>
        {/* #7 – zoekveld */}
        <input
          value={klantZoekPlan}
          onChange={e=>setKlantZoekPlan(e.target.value)}
          onBlur={()=>setKlantZoekPlan("")}   // #7 – leeg na klikken weg
          placeholder="🔍 Zoek klant..."
          style={{...inp,fontSize:12,padding:"4px 8px",marginBottom:8}}
        />
        {gefilterdeInteplannen.length===0
          ? <div style={{fontSize:12,color:C.muted,textAlign:"center",padding:16}}>Geen klanten te plannen</div>
          : gefilterdeInteplannen.map(({client,volgende,status}) => (
            <div key={client.naam}
              draggable
              onDragStart={e=>{ e.dataTransfer.setData("text/plain", client.naam); }}
              style={{
                background:status.bg, border:`1px solid ${status.kleur}55`,
                borderLeft:`4px solid ${status.kleur}`,
                borderRadius:8,padding:"8px 10px",marginBottom:8,cursor:"grab",userSelect:"none"
              }}
              onClick={()=>{onNieuwRecord(client.naam);setKlantZoekPlan("");}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontSize:12,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}>{client.naam}</span>
                <span style={{fontSize:10,fontWeight:700,color:"white",background:status.kleur,borderRadius:10,padding:"1px 6px",whiteSpace:"nowrap"}}>{status.label}</span>
              </div>
              <div style={{fontSize:11,color:C.muted}}>📅 {fmtDateShort(volgende)}</div>
              {/* #10 */}
              {client.verwachteOmzet>0 && <div style={{fontSize:11,color:C.accent,fontWeight:600}}>💰 {fmtEur(client.verwachteOmzet)}</div>}
              {client.route && <div style={{fontSize:10,color:C.primaryLight}}>📍 {client.route}</div>}
              {client.commentaar && <div style={{fontSize:10,color:C.muted,marginTop:1,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>💬 {client.commentaar}</div>}
            </div>
          ))
        }
        {/* #11 – legenda met duidelijker kleuronderscheid */}
        <div style={{marginTop:10,fontSize:10,color:C.muted,lineHeight:1.8,borderTop:`1px solid ${C.border}`,paddingTop:8}}>
          <div><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:C.telaatKleur,marginRight:4}}></span>Te laat</div>
          <div><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:C.dezeweekKleur,marginRight:4}}></span>Deze week</div>
          <div><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:"#CA6F1E",marginRight:4}}></span>Volgende week</div>
          <div><span style={{display:"inline-block",width:10,height:10,borderRadius:2,background:C.green,marginRight:4}}></span>Over 2 weken</div>
          <div style={{marginTop:4,fontSize:10,fontStyle:"italic"}}>Klik of sleep naar de kalender</div>
        </div>
      </div>

      {/* Kalender */}
      <div style={{background:C.surface,borderRadius:14,padding:20,boxShadow:"0 2px 8px rgba(0,0,0,.07)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            {/* Dag/Week/Maand knoppen */}
            <div style={{display:"flex",background:C.bg,borderRadius:8,padding:3,gap:2}}>
              {[["dag","Dag"],["week","Week"],["maand","Maand"]].map(([k,l])=>(
                <button key={k} onClick={()=>onPlanViewChange(k)} style={{
                  background:planView===k?C.primary:"transparent",color:planView===k?"#fff":C.muted,
                  border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:12,fontWeight:600}}>
                  {l}
                </button>
              ))}
            </div>
            {/* #6 – Dag-navigatie */}
            {planView==="dag" && <>
              <button onClick={()=>onDagOffsetChange(dagOffset-1)} style={{...btnOutline,padding:"4px 10px"}}>◀</button>
              <span style={{fontWeight:700,fontSize:13,color:C.primary,whiteSpace:"nowrap"}}>{fmtDate(activeDay)}</span>
              <button onClick={()=>onDagOffsetChange(dagOffset+1)} style={{...btnOutline,padding:"4px 10px"}}>▶</button>
              <button onClick={()=>onDagOffsetChange(0)} style={{...btnOutline,padding:"4px 8px",fontSize:11}}>Vandaag</button>
            </>}
            {/* Week navigatie */}
            {planView==="week" && <>
              <button onClick={()=>onDagOffsetChange(dagOffset-7)} style={{...btnOutline,padding:"4px 10px"}}>◀</button>
              <span style={{fontWeight:700,fontSize:13,color:C.primary,whiteSpace:"nowrap"}}>
                Wk {isoWeek(weekDates[0])} — {weekDates[0].toLocaleDateString("nl-NL",{day:"2-digit",month:"short"})} t/m {weekDates[6].toLocaleDateString("nl-NL",{day:"2-digit",month:"short",year:"numeric"})}
              </span>
              <button onClick={()=>onDagOffsetChange(dagOffset+7)} style={{...btnOutline,padding:"4px 10px"}}>▶</button>
              <button onClick={()=>onDagOffsetChange(0)} style={{...btnOutline,padding:"4px 8px",fontSize:11}}>Vandaag</button>
            </>}
          </div>
          <button onClick={()=>onNieuwRecord(null)} style={btnAccent}>+ Nieuw record</button>
        </div>

        {planView==="dag"   && <DagView/>}
        {planView==="week"  && <WeekView/>}
        {planView==="maand" && <MaandView/>}
      </div>
    </div>
  );
}

// ─── Excel import modal ───────────────────────────────────────────────────────
function ExcelImportModal({ onImport, onClose, bestaandeNamen }) {
  const [preview, setPreview] = useState(null);
  const [modus, setModus]     = useState("toevoegen");
  const [bezig, setBezig]     = useState(false);
  const [foutMsg, setFoutMsg] = useState("");
  const [kolomMapping, setKolomMapping] = useState(null); // voor handmatige mapping
  const fileRef = useRef();

  // Kolom-aliassen: appveld → mogelijke kolomnamen in Excel/CSV
  const VELD_MAP = {
    naam:         ["naam","name","klant","client","bedrijf","company","klantnaam","volledige naam"],
    type:         ["type","soort","organisatie","org","particulier","klanttype"],
    telefoon:     ["telefoon","tel","phone","mobiel","mobile","gsm","whatsapp","telefoonnummer","phonenumber"],
    email:        ["email","e-mail","emailadres","e-mailadres","mail"],
    straat:       ["straat","adres","street","address","straatnaam"],
    huisnr:       ["huisnummer","huisnr","nr","number","hnr","huis nr"],
    postcode:     ["postcode","pc","zip","zipcode","postal","postalcode"],
    plaats:       ["plaats","city","stad","town","woonplaats","gemeente"],
    route:        ["route","ronde","wijk","district","area","route naam"],
    frequentie:   ["frequentie","frequency","freq","interval","periodiciteit"],
    verwachteOmzet:["omzet","verwachte omzet","bedrag","prijs","price","amount","omzet verwacht"],
    klantnr:      ["klantnummer","klantnr","nr klant","customer number","clientnr","id"],
    commentaar:   ["commentaar","opmerking","notitie","note","notes","comment","remarks"],
  };

  function detecteerKolom(keys, aliassen) {
    return keys.find(k => aliassen.some(a => k.toLowerCase().trim() === a.toLowerCase()));
  }
  function detecteerType(w) {
    if (!w) return "part";
    const v = String(w).toLowerCase().trim();
    if (["org","organisatie","bedrijf","company","zakelijk","b2b","bv","nv","vof","stichting"].some(k=>v.includes(k))) return "org";
    return "part";
  }

  function verwerkBestand(bestand) {
    setFoutMsg(""); setBezig(true);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb   = XLSX.read(data,{type:"array"});
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rijen = XLSX.utils.sheet_to_json(ws,{defval:""});
        if (!rijen||rijen.length===0) { setFoutMsg("Bestand lijkt leeg."); setBezig(false); return; }
        const keys = Object.keys(rijen[0]);

        // Auto-detecteer alle kolommen
        const mapping = {};
        Object.entries(VELD_MAP).forEach(([veld,aliassen]) => {
          const k = detecteerKolom(keys, aliassen);
          if (k) mapping[veld] = k;
        });

        if (!mapping.naam) { setFoutMsg(`Geen naamkolom gevonden. Kolommen: ${keys.join(", ")}`); setBezig(false); return; }

        const bestaandSet = new Set(bestaandeNamen.map(n=>n.toLowerCase()));
        const resultaat = [], fouten = [];
        rijen.forEach((rij,i) => {
          const naam = String(rij[mapping.naam]||"").trim();
          if (!naam) { fouten.push(`Rij ${i+2}: lege naam`); return; }
          const typeRaw = mapping.type ? String(rij[mapping.type]||"").trim() : "";
          const straat  = mapping.straat   ? String(rij[mapping.straat]||"").trim()   : "";
          const huisnr  = mapping.huisnr   ? String(rij[mapping.huisnr]||"").trim()   : "";
          const postcode= mapping.postcode ? String(rij[mapping.postcode]||"").trim().toUpperCase() : "";
          const plaats  = mapping.plaats   ? String(rij[mapping.plaats]||"").trim()   : "";
          // Combineer adres
          let adres = "";
          if (straat && huisnr && postcode && plaats) adres = `${straat} ${huisnr}, ${postcode} ${plaats}`;
          else if (straat && huisnr) adres = `${straat} ${huisnr}`;
          else if (straat) adres = straat;

          resultaat.push({
            naam,
            type:           detecteerType(typeRaw||naam),
            telefoon:       mapping.telefoon    ? String(rij[mapping.telefoon]||"").trim()    : "",
            email:          mapping.email       ? String(rij[mapping.email]||"").trim()       : "",
            straat, huisnr, postcode, plaats, adres,
            route:          mapping.route       ? String(rij[mapping.route]||"").trim()       : "",
            frequentie:     mapping.frequentie  ? String(rij[mapping.frequentie]||"").trim()  : "1 maand",
            verwachteOmzet: mapping.verwachteOmzet ? parseFloat(String(rij[mapping.verwachteOmzet]||"").replace(",",".")) || 0 : 0,
            klantnr:        mapping.klantnr     ? String(rij[mapping.klantnr]||"").trim()     : "",
            commentaar:     mapping.commentaar  ? String(rij[mapping.commentaar]||"").trim()  : "",
            dubbel:         bestaandSet.has(naam.toLowerCase()),
          });
        });
        setKolomMapping({mapping, kolommen:keys});
        setPreview({rijen:resultaat,fouten,bestand:bestand.name});
      } catch(err) { setFoutMsg("Fout: "+err.message); }
      setBezig(false);
    };
    reader.readAsArrayBuffer(bestand);
  }

  function doImport() {
    if (!preview) return;
    const nieuweClients = preview.rijen
      .filter(r => modus==="vervangen" || !r.dubbel)
      .map(r => ({
        naam:r.naam, type:r.type, telefoon:r.telefoon||"", email:r.email||"",
        straat:r.straat||"", huisnr:r.huisnr||"", postcode:r.postcode||"", plaats:r.plaats||"",
        adres:r.adres||"", route:r.route||"", frequentie:r.frequentie||"1 maand",
        verwachteOmzet:r.verwachteOmzet||0, klantnr:r.klantnr||"", commentaar:r.commentaar||"",
        volgendeWasdagVrij:null, laatsteWasdag:null, taken:[],
      }));
    onImport(nieuweClients, modus);
  }

  const nieuweCount = preview ? preview.rijen.filter(r=>!r.dubbel).length : 0;
  const dubbelCount = preview ? preview.rijen.filter(r=>r.dubbel).length  : 0;
  const VELD_LABELS = {naam:"Naam",type:"Type",telefoon:"Telefoon",email:"E-mail",straat:"Straat",huisnr:"Huisnr.",postcode:"Postcode",plaats:"Plaats",route:"Route",frequentie:"Frequentie",verwachteOmzet:"Omzet (€)",klantnr:"Klantnr.",commentaar:"Opmerking"};

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100}}>
      <div style={{background:C.surface,borderRadius:16,padding:28,width:600,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 12px 48px rgba(0,0,0,.28)"}}>
        <h3 style={{margin:"0 0 4px",color:C.primary,fontSize:18}}>📥 Klantenlijst importeren</h3>
        <p style={{margin:"0 0 16px",fontSize:13,color:C.muted}}>Importeer Excel (.xlsx) of CSV. Kolommen worden automatisch herkend.</p>

        {!preview&&(
          <div onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)verwerkBestand(f);}} onDragOver={e=>e.preventDefault()}
            onClick={()=>fileRef.current.click()}
            style={{border:`2px dashed ${C.primaryLight}`,borderRadius:12,padding:"32px 20px",textAlign:"center",cursor:"pointer",background:"#F0F8FF",marginBottom:16}}>
            <div style={{fontSize:36,marginBottom:8}}>📂</div>
            <div style={{fontSize:14,color:C.primary,fontWeight:600}}>Sleep een bestand hierheen</div>
            <div style={{fontSize:12,color:C.muted,marginTop:4}}>of klik om te bladeren (.xlsx, .csv)</div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>{if(e.target.files[0])verwerkBestand(e.target.files[0]);}}/>
          </div>
        )}
        {bezig&&<div style={{textAlign:"center",padding:20,color:C.muted}}>⏳ Verwerken…</div>}
        {foutMsg&&<div style={{background:"#FDEDEC",border:`1px solid ${C.danger}`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.danger,marginBottom:12}}>{foutMsg}</div>}

        {preview&&!bezig&&(
          <>
            <div style={{background:C.greenBg,borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13}}>
              <strong>{preview.bestand}</strong> — {preview.rijen.length} rijen
              {nieuweCount>0&&<span style={{marginLeft:10,color:C.green}}>✚ {nieuweCount} nieuw</span>}
              {dubbelCount>0&&<span style={{marginLeft:10,color:C.warning}}>⚠ {dubbelCount} al aanwezig</span>}
            </div>

            {/* Herkende kolommen */}
            {kolomMapping&&(
              <div style={{background:C.bg,borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12}}>
                <div style={{fontWeight:700,color:C.muted,marginBottom:6,fontSize:11,textTransform:"uppercase"}}>Herkende kolommen</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {Object.entries(kolomMapping.mapping).map(([veld,kol])=>(
                    <span key={veld} style={{background:"#EBF5FB",border:`1px solid ${C.primaryLight}`,borderRadius:6,padding:"2px 8px",fontSize:11}}>
                      <strong>{VELD_LABELS[veld]||veld}</strong> ← {kol}
                    </span>
                  ))}
                </div>
                {Object.keys(kolomMapping.mapping).length < Object.keys(VELD_LABELS).length && (
                  <div style={{marginTop:6,fontSize:11,color:C.muted}}>
                    Niet herkend: {Object.keys(VELD_LABELS).filter(v=>!kolomMapping.mapping[v]).map(v=>VELD_LABELS[v]).join(", ")}
                    {" "}— handmatig invullen na import.
                  </div>
                )}
              </div>
            )}

            {/* Preview eerste 5 rijen */}
            <div style={{background:C.bg,borderRadius:8,padding:"10px 14px",marginBottom:14,maxHeight:200,overflowY:"auto"}}>
              <div style={{fontWeight:700,color:C.muted,marginBottom:6,fontSize:11,textTransform:"uppercase"}}>Preview (eerste 5 rijen)</div>
              {preview.rijen.slice(0,5).map((r,i)=>(
                <div key={i} style={{display:"flex",gap:8,padding:"4px 0",borderBottom:`1px solid ${C.border}`,fontSize:12,alignItems:"center"}}>
                  {r.dubbel&&<span style={{color:C.warning,fontSize:10,whiteSpace:"nowrap"}}>⚠ dubbelaan</span>}
                  <strong style={{minWidth:120,color:r.dubbel?C.warning:C.text}}>{r.naam}</strong>
                  {r.klantnr&&<span style={{color:C.muted,fontFamily:"monospace"}}>#{r.klantnr}</span>}
                  {r.straat&&<span style={{color:C.muted}}>{r.straat} {r.huisnr}, {r.postcode} {r.plaats}</span>}
                  {r.telefoon&&<span style={{color:C.muted,marginLeft:"auto"}}>{r.telefoon}</span>}
                </div>
              ))}
              {preview.rijen.length>5&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>… en {preview.rijen.length-5} meer</div>}
            </div>

            <div style={{display:"flex",gap:10,marginBottom:14}}>
              {[["toevoegen","Toevoegen (overslaan dubbelen)"],["vervangen","Alles importeren (incl. dubbelen)"]].map(([v,l])=>(
                <button key={v} onClick={()=>setModus(v)} style={{flex:1,padding:"8px 12px",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",
                  border:`2px solid ${modus===v?C.primary:C.border}`,background:modus===v?C.dayBg:C.bg,color:modus===v?C.primary:C.muted}}>{l}</button>
              ))}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={()=>{setPreview(null);setKolomMapping(null);}} style={btnOutline}>↩ Ander bestand</button>
              <button onClick={doImport} style={btnAccent}>✅ {nieuweCount} klanten importeren</button>
            </div>
          </>
        )}
        <div style={{marginTop:16,display:"flex",justifyContent:"flex-end"}}>
          <button onClick={onClose} style={btnOutline}>Sluiten</button>
        </div>
      </div>
    </div>
  );
}

// ─── Backup modal ─────────────────────────────────────────────────────────────
function BackupModal({ records, clients, routes, onRestore, onClose }) {
  const [tab, setTab]       = useState("backup");
  const [foutMsg, setFoutMsg] = useState("");
  const [succes, setSucces] = useState("");
  const [previewData, setPreviewData] = useState(null);
  const fileRef = useRef();

  function maakBackup() {
    const payload = { versie:APP_VERSIE, aangemaakt:new Date().toISOString(), aantalRecords:records.length, aantalKlanten:clients.length, records:serializeRecords(records), clients, routes };
    downloadBestand(JSON.stringify(payload,null,2),`JFG_Backup_${datumStempel()}.json`,"application/json");
    setSucces("✅ Backup opgeslagen");
  }

  function maakExcelExport() {
    const betalingenRijen = records.map(r => {
      const btwIngr = BTW_INBEGREPEN_WIJZEN.includes(r.betaalwijze);
      const {excl,btw,incl} = calcBedragen(r.bedrag,r.btwPct,btwIngr);
      return {"Weeknummer":isoWeek(r.datum),"Klant":r.naam,"Datum":fmtDate(r.datum),"Afspraak":r.status==="bevestigd"?"Bevestigd":r.status==="voorstel"?"Voorstel":"","Betaalwijze":r.betaalwijze,"Betaald":r.betaald?"Ja":"Nee","Excl. BTW":excl,"BTW":btw,"Incl. BTW":incl,"BTW %":r.btwPct};
    });
    const namenRijen = clients.map(c=>({Naam:c.naam,Type:c.type==="org"?"Organisatie":"Particulier",Telefoon:c.telefoon||"",Frequentie:c.frequentie||"",VerwachteOmzet:c.verwachteOmzet||0,Route:c.route||"",Commentaar:c.commentaar||""}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(betalingenRijen),"Betalingen");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(namenRijen),"Klantenlijst");
    XLSX.writeFile(wb,`JFG_Export_${datumStempel()}.xlsx`);
    setSucces("✅ Excel export opgeslagen");
  }

  function leesRestoreBestand(bestand) {
    setFoutMsg(""); setPreviewData(null);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const obj = JSON.parse(e.target.result);
        if (!obj.records||!obj.clients) throw new Error("Ongeldig backupbestand.");
        setPreviewData({...obj,records:deserializeRecords(obj.records)});
      } catch(err) { setFoutMsg("Fout: "+err.message); }
    };
    reader.readAsText(bestand);
  }

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1100}}>
      <div style={{background:C.surface,borderRadius:16,padding:28,width:500,boxShadow:"0 12px 48px rgba(0,0,0,.28)",maxHeight:"85vh",overflowY:"auto"}}>
        <h3 style={{margin:"0 0 16px",color:C.primary,fontSize:18}}>💾 Backup & Export</h3>
        <div style={{display:"flex",gap:8,marginBottom:20,background:C.bg,borderRadius:8,padding:4}}>
          {[["backup","💾 Backup"],["restore","📂 Herstellen"]].map(([t,l])=>(
            <button key={t} onClick={()=>{setTab(t);setFoutMsg("");setSucces("");setPreviewData(null);}} style={{flex:1,padding:"7px 12px",borderRadius:6,border:"none",cursor:"pointer",background:tab===t?C.surface:"transparent",color:tab===t?C.primary:C.muted,fontWeight:tab===t?700:400,fontSize:13,boxShadow:tab===t?"0 1px 4px rgba(0,0,0,.10)":"none"}}>{l}</button>
          ))}
        </div>
        {succes&&<div style={{background:C.greenBg,borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:C.green}}>{succes}</div>}
