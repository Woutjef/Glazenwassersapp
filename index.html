// ─── Hoofd App ────────────────────────────────────────────────────────────────
function App() {
  // #5 – laad vanuit localStorage indien beschikbaar
  const savedData = useMemo(() => lsLoad(), []);

  const [records,         setRecords]         = useState(() => savedData?.records   || seedData);
  const [clients,         setClients]         = useState(() => savedData?.clients   || initClients);
  // #2 – routes persistent
  const [routes,          setRoutes]          = useState(() => savedData?.routes    || initRoutes);

  // nextId corrigeren op basis van geladen records
  useEffect(() => {
    const maxId = (savedData?.records||seedData).reduce((m,r)=>Math.max(m,r.id||0),0);
    if(maxId >= nextId) nextId = maxId + 1;
  }, []); // eslint-disable-line
  const [activeTab,       setActiveTab]       = useState("dashboard");
  const [activeMaand,     setActiveMaand]     = useState(new Date().getMonth());
  const [activeJaar,      setActiveJaar]      = useState(new Date().getFullYear());
  const [showForm,        setShowForm]        = useState(false);
  const [showFormNaam,    setShowFormNaam]    = useState(null);
  const [editRec,         setEditRec]         = useState(null);
  const [showImport,      setShowImport]      = useState(false);
  const [showBackup,      setShowBackup]      = useState(false);
  const [filter,          setFilter]          = useState({status:"all",betaald:"all",zoek:""});
  const [importSucces,    setImportSucces]    = useState("");
  const [klantZoek,       setKlantZoek]       = useState("");
  const [waInstellingen,  setWaInstellingen]  = useState({telefoon:"",tikkie:"",templates:DEFAULT_WA_TEMPLATES});
  const [bevestigVerwijder,setBevestigVerwijder]=useState(null);
  const [showWaInst,      setShowWaInst]      = useState(false);
  const [waVerstuurRec,   setWaVerstuurRec]   = useState(null);
  // #6 – dagOffset in plaats van weekOffset
  const [dagOffset,       setDagOffset]       = useState(0);
  const [planView,        setPlanView]        = useState("week");
  const [showKlantModal,  setShowKlantModal]  = useState(false);
  const [editKlant,       setEditKlant]       = useState(null);
  const [showRouteBeheer, setShowRouteBeheer] = useState(false);
  const [dubbelklikRec,   setDubbelklikRec]   = useState(null); // {record, client}

  const clientMap = useMemo(()=>{ const m={}; clients.forEach(c=>m[c.naam]=c); return m; },[clients]);

  // #5 – auto-opslaan bij elke wijziging
  useEffect(() => { lsSave(records, clients, routes); }, [records, clients, routes]);

  const maandRecs = useMemo(()=>records.filter(r=>r.datum.getMonth()===activeMaand&&r.datum.getFullYear()===activeJaar),[records,activeMaand,activeJaar]);
  const gefilterd = useMemo(()=>maandRecs.filter(r=>{
    if(filter.status!=="all"&&r.status!==filter.status) return false;
    if(filter.betaald==="betaald"&&!r.betaald) return false;
    if(filter.betaald==="onbetaald"&&r.betaald) return false;
    if(filter.zoek&&!r.naam.toLowerCase().includes(filter.zoek.toLowerCase())) return false;
    return true;
  }).sort((a,b)=>a.datum-b.datum),[maandRecs,filter]);

  const dagGroepen = useMemo(()=>{
    const map={};
    gefilterd.forEach(r=>{const k=datKey(r.datum);if(!map[k])map[k]={datum:r.datum,recs:[]};map[k].recs.push(r);});
    return Object.values(map).sort((a,b)=>a.datum-b.datum);
  },[gefilterd]);

  const calcIncl = r => calcBedragen(r.bedrag,r.btwPct,BTW_INBEGREPEN_WIJZEN.includes(r.betaalwijze)).incl;

  const stats = useMemo(()=>{
    const jaarRecs=records.filter(r=>r.datum.getFullYear()===activeJaar);
    return {
      totalIncl:   jaarRecs.reduce((s,r)=>s+calcIncl(r),0),
      betaaldIncl: records.filter(r=>r.betaald).reduce((s,r)=>s+calcIncl(r),0),
      openCount:   records.filter(r=>!r.betaald).length,
      maandIncl:   maandRecs.reduce((s,r)=>s+calcIncl(r),0),
    };
  },[records,maandRecs,activeJaar]);

  const maandTotaal = useMemo(()=>gefilterd.reduce((acc,r)=>{
    const {excl,btw,incl}=calcBedragen(r.bedrag,r.btwPct,BTW_INBEGREPEN_WIJZEN.includes(r.betaalwijze));
    return {excl:acc.excl+excl,btw:acc.btw+btw,incl:acc.incl+incl};
  },{excl:0,btw:0,incl:0}),[gefilterd]);

  const omzetPerMaand = useMemo(()=>MAANDEN.map((naam,mi)=>{
    const recs=records.filter(r=>r.datum.getMonth()===mi&&r.datum.getFullYear()===activeJaar);
    const incl=recs.reduce((s,r)=>s+calcIncl(r),0);
    const betaald=recs.filter(r=>r.betaald).reduce((s,r)=>s+calcIncl(r),0);
    return {naam,incl,betaald,count:recs.length};
  }),[records,activeJaar]);

  const maxOmzet = Math.max(...omzetPerMaand.map(m=>m.incl),1);
  const klantOmzetStats = useMemo(()=>{
    const perKlant=clients.map(c=>({naam:c.naam,omzet:records.filter(r=>r.naam===c.naam).reduce((s,r)=>s+calcIncl(r),0)})).filter(k=>k.omzet>0).sort((a,b)=>b.omzet-a.omzet);
    return {top5:perKlant.slice(0,5),bottom5:[...perKlant].reverse().slice(0,5)};
  },[records,clients]);

  // ── Acties ──────────────────────────────────────────────────────────────────

  // #1 – laatste wasdag = meest recente datum van die klant in records
  function syncLaatsteWasdag(naam, allRecords) {
    const nieuwste = berekenLaatsteWasdagUitRecords(naam, allRecords);
    if (!nieuwste) return;
    setClients(cs => cs.map(c => c.naam===naam && (!c.laatsteWasdag || nieuwste > c.laatsteWasdag)
      ? {...c, laatsteWasdag: nieuwste} : c));
  }

  function addRecord(rec) {
    const nieuw = {...rec,id:makeId()};
    const nieuweRecords = [...records, nieuw];
    setRecords(nieuweRecords);
    setActiveMaand(rec.datum.getMonth());
    setActiveJaar(rec.datum.getFullYear());
    syncLaatsteWasdag(rec.naam, nieuweRecords); // #1
    setShowForm(false);
    setShowFormNaam(null);
  }

  function saveEdit(rec) {
    const nieuweRecords = records.map(x=>x.id===rec.id?rec:x);
    setRecords(nieuweRecords);
    syncLaatsteWasdag(rec.naam, nieuweRecords); // #1
    setEditRec(null);
  }

  // #2 – drop: klant slepen naar datum → nieuw record
  function handleDropRecord(naam, datum, recordId, uur) {
    // Zet het tijdstip op het geselecteerde uur (0=geen tijdstip)
    const datumMetUur = new Date(datum);
    if (uur != null) datumMetUur.setHours(uur, 0, 0, 0);
    if (recordId != null) {
      const nieuweRecords = records.map(x => x.id===recordId ? {...x, datum: datumMetUur} : x);
      setRecords(nieuweRecords);
      setActiveMaand(datumMetUur.getMonth());
      setActiveJaar(datumMetUur.getFullYear());
      const rec = records.find(x=>x.id===recordId);
      if (rec) syncLaatsteWasdag(rec.naam, nieuweRecords);
      return;
    }
    const c = clientMap[naam];
    if (!c) return;
    const nieuw = {
      id:makeId(), naam, datum: datumMetUur,
      betaalwijze: c.type==="org" ? "Factuur" : "Contant",
      betaald: c.type==="part",
      btwPct: 21, bedrag: c.verwachteOmzet || 0, status:""
    };
    const nieuweRecords = [...records, nieuw];
    setRecords(nieuweRecords);
    setActiveMaand(datumMetUur.getMonth());
    setActiveJaar(datumMetUur.getFullYear());
    syncLaatsteWasdag(naam, nieuweRecords);
  }

  function toggleBetaald(id,was) {
    if(was) {
      setBevestigVerwijder({tekst:"Vinkje 'Betaald' verwijderen?",onJa:()=>{setRecords(r=>r.map(x=>x.id===id?{...x,betaald:false}:x));setBevestigVerwijder(null);}});
    } else {
      const rec=records.find(x=>x.id===id);
      if(rec&&rec.betaalwijze==="Factuur"&&!rec.factuurVerstuurd) {
        setBevestigVerwijder({tekst:"⚠️ Factuur nog niet verstuurd. Toch als betaald markeren?",jaLabel:"Ja",onJa:()=>{setRecords(r=>r.map(x=>x.id===id?{...x,betaald:true}:x));setBevestigVerwijder(null);}});
      } else {
        setRecords(r=>r.map(x=>x.id===id?{...x,betaald:true}:x));
      }
    }
  }
  function toggleFactuur(id,was) {
    if(was) {
      const rec=records.find(x=>x.id===id);
      if(rec&&rec.betaald) {
        setBevestigVerwijder({tekst:"⚠️ Record is al betaald. Factuur-vinkje verwijderen?",jaLabel:"Ja",onJa:()=>{setRecords(r=>r.map(x=>x.id===id?{...x,factuurVerstuurd:false}:x));setBevestigVerwijder(null);}});
      } else {
        setBevestigVerwijder({tekst:"Vinkje 'Factuur verstuurd' verwijderen?",onJa:()=>{setRecords(r=>r.map(x=>x.id===id?{...x,factuurVerstuurd:false}:x));setBevestigVerwijder(null);}});
      }
    } else {
      setRecords(r=>r.map(x=>x.id===id?{...x,factuurVerstuurd:true}:x));
    }
  }
  function toggleStatus(id,status) {
    const rec=records.find(x=>x.id===id);
    if(rec&&rec.status===status) {
      setBevestigVerwijder({tekst:"Afspraakstatus verwijderen?",onJa:()=>{setRecords(r=>r.map(x=>x.id===id?{...x,status:""}:x));setBevestigVerwijder(null);}});
    } else {
      setRecords(r=>r.map(x=>x.id===id?{...x,status}:x));
    }
  }
  // ── Snelstart sync ──────────────────────────────────────────────────────────
  function updateSnelstart(id, velden) {
    setRecords(r=>r.map(x=>x.id===id?{...x,...velden}:x));
  }
  function deleteRecord(id) {
    const rec=records.find(x=>x.id===id);
    setBevestigVerwijder({tekst:`Record van ${rec?rec.naam:"dit record"} verwijderen?`,onJa:()=>{
      const nieuweRecords=records.filter(x=>x.id!==id);
      setRecords(nieuweRecords);
      if(rec) syncLaatsteWasdag(rec.naam, nieuweRecords); // #1
      setBevestigVerwijder(null);
    }});
  }

  // #3 – routes beheren: hernoemen en verwijderen
  // definitief = {klantnaam: nieuweRoute} – wizard-keuzes per klant
  // nieuweRondes = [string] – nieuw aan te maken rondes
  function renameRoute(oud, nieuw, definitief, nieuweRondes) {
    // Voeg nieuwe rondes toe aan de routelijst
    if (nieuweRondes && nieuweRondes.length > 0) {
      setRoutes(rs => {
        let updated = rs.map(r => r===oud ? nieuw : r);
        nieuweRondes.forEach(nr => { if (!updated.includes(nr)) updated = [...updated, nr]; });
        return updated;
      });
    } else {
      setRoutes(rs => rs.map(r => r===oud ? nieuw : r));
    }
    setClients(cs => cs.map(c => {
      if (c.route !== oud) return c;
      if (definitief && c.naam in definitief) return {...c, route: definitief[c.naam]};
      return {...c, route: nieuw}; // fallback: nieuwe naam
    }));
  }
  function deleteRoute(r, definitief, nieuweRondes) {
    setRoutes(rs => {
      let updated = rs.filter(x => x!==r);
      if (nieuweRondes && nieuweRondes.length > 0) {
        nieuweRondes.forEach(nr => { if (!updated.includes(nr)) updated = [...updated, nr]; });
      }
      return updated;
    });
    setClients(cs => cs.map(c => {
      if (c.route !== r) return c;
      if (definitief && c.naam in definitief) return {...c, route: definitief[c.naam]};
      return {...c, route: ""};
    }));
  }
  // #2 – nieuwe route direct toevoegen (vanuit KlantModal)
  function addRoute(r) {
    const n = titelCaseRoute(r);
    if (!n) return;
    setRoutes(rs => rs.includes(n) ? rs : [...rs, n]);
  }

  function addClient(nieuw) {
    if(!nieuw.naam||clientMap[nieuw.naam]) return;
    const {_nieuweRoute,...rest} = nieuw;
    setClients(c=>[...c,rest]);
  }

  function saveClientEdit(oudeNaam, nieuweData) {
    const {_nieuweRoute,...rest} = nieuweData;
    setClients(c=>c.map(x=>x.naam===oudeNaam?{...x,...rest}:x));
    if(rest.naam && rest.naam!==oudeNaam) {
      setRecords(r=>r.map(x=>x.naam===oudeNaam?{...x,naam:rest.naam}:x));
    }
    setEditKlant(null);
  }

  function deleteClient(naam) {
    setBevestigVerwijder({tekst:`Klant "${naam}" verwijderen? Betalingsrecords blijven bewaard.`,onJa:()=>{setClients(c=>c.filter(x=>x.naam!==naam));setBevestigVerwijder(null);}});
  }

  // #9 – frequentie update (vanuit RecordForm of Klantenlijst), synchroon opslaan
  function updateClientFreq(naam, nieuweFreq, vrijDatum) {
    setClients(cs=>cs.map(c=>c.naam===naam?{...c,frequentie:nieuweFreq,volgendeWasdagVrij:vrijDatum||null}:c));
  }

  function handleImport(nieuweClients,modus) {

      nieuweClients.forEach(c=>{const oud=map[c.naam.toLowerCase()];map[c.naam.toLowerCase()]={...oud,...c};});

      setClients(c=>[...c,...echt_nieuw]);

    }
    setShowImport(false);
    setTimeout(()=>setImportSucces(""),5000);
  }

                        <td style={{padding:"8px 12px",textAlign:"right",fontSize:12,color:C.accent}}>{c.verwachteOmzet>0?fmtEur(c.verwachteOmzet):"—"}</td>
                        <td style={{padding:"8px 12px",textAlign:"right",color:C.muted}}>{cRecs.length}</td>
                        <td style={{padding:"8px 12px",textAlign:"right",fontWeight:600,color:omzet>0?C.accent:C.muted}}>{omzet>0?fmtEur(omzet):"—"}</td>
                        <td style={{padding:"8px 12px"}}>
                          <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                            <button title="Bewerken" onClick={()=>{setEditKlant(c);setShowKlantModal(true);}}
                              style={{border:"none",background:"#EBF5FB",color:C.primaryLight,borderRadius:5,cursor:"pointer",padding:"3px 7px",lineHeight:1}}>
                              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button title="Verwijderen" onClick={()=>deleteClient(c.naam)}
                              style={{border:"none",background:C.bg,color:C.danger,borderRadius:5,cursor:"pointer",padding:"3px 7px",fontSize:13}}>✕</button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {/* Zijpanel */}
            <div className="klanten-zijpanel" style={{display:"flex",flexDirection:"column",gap:14,minWidth:220,maxWidth:240}}>
              <div style={{background:C.surface,borderRadius:12,padding:"16px",boxShadow:"0 2px 8px rgba(27,79,114,.10)"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.green,marginBottom:10}}>🏆 Top 5 hoogste omzet</div>
                {klantOmzetStats.top5.length===0?<div style={{fontSize:12,color:C.muted}}>—</div>
                  :klantOmzetStats.top5.map((k,i)=>(
                    <div key={k.naam} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:i<4?`1px solid ${C.border}`:"none"}}>
                      <span style={{fontSize:12,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:120}}><span style={{fontWeight:700,color:C.green,marginRight:4}}>#{i+1}</span>{k.naam}</span>
                      <span style={{fontSize:12,fontWeight:700,color:C.green,marginLeft:6,whiteSpace:"nowrap"}}>{fmtEur(k.omzet)}</span>
                    </div>
                  ))}
              </div>
              {/* Routes overzicht */}
              <div style={{background:C.surface,borderRadius:12,padding:"16px",boxShadow:"0 2px 8px rgba(27,79,114,.10)"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.primaryLight}}>📍 Routes ({routes.length})</div>
                  <button onClick={()=>setShowRouteBeheer(true)} style={{...btnOutline,padding:"3px 8px",fontSize:11}}>⚙ Beheren</button>
                </div>
                {routes.map(r=>{
                  const n = clients.filter(c=>c.route===r).length;
                  return <div key={r} style={{fontSize:12,color:C.text,padding:"4px 0",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between"}}>
                    <span>{r}</span>
                    <span style={{color:C.muted,fontSize:11}}>{n} klant{n!==1?"en":""}</span>
                  </div>;
                })}
              </div>
            </div>
          </div>
        )}

        {/* ── Planning ── */}
        {activeTab==="planning"&&(
          <PlanningTab
            records={records}
            clients={clients}
            dagOffset={dagOffset}
            onDagOffsetChange={setDagOffset}
            planView={planView}
            onPlanViewChange={setPlanView}
            onEditRecord={r=>{setEditRec(r);}}
            onDeleteRecord={deleteRecord}
            onNieuwRecord={(voorvulNaam)=>{setShowFormNaam(voorvulNaam||null);setShowForm(true);}}
            onDropRecord={handleDropRecord}
            onDubbelklik={r=>{const c=clientMap[r.naam]; setDubbelklikRec({record:r,client:c});}}
          />
        )}

        {/* ── Communicatie ── */}
        {activeTab==="communicatie"&&<CommunicatieTab clients={clients}/>}

      </div>

      {/* Modals */}
      {showForm&&(
        <RecordForm
          clients={clients}
          title="➕ Nieuw record"
          onSave={addRecord}
          onClose={()=>{setShowForm(false);setShowFormNaam(null);}}
          onUpdateClientFreq={updateClientFreq}
          initial={showFormNaam ? {naam:showFormNaam,datum:new Date(),betaalwijze:"Factuur",betaald:false,btwPct:21,bedrag:"",status:""} : undefined}
        />
      )}
      {editRec&&(
        <RecordForm
          clients={clients}
          title="✏️ Record wijzigen"
          onSave={rec=>{saveEdit(rec);setEditRec(null);}}
          onClose={()=>setEditRec(null)}
          onUpdateClientFreq={updateClientFreq}
          initial={editRec}
        />
      )}
      {showKlantModal&&(
        <KlantModal
          title={editKlant?"✏️ Klant bewerken":"➕ Nieuwe klant"}
          routes={routes}
          clients={clients}
          initial={editKlant}
          onAddRoute={addRoute}
          onSave={data=>{
            if(editKlant) saveClientEdit(editKlant.naam,data);
            else addClient(data);
            setShowKlantModal(false);
            setEditKlant(null);
          }}
          onClose={()=>{setShowKlantModal(false);setEditKlant(null);}}
        />
      )}
      {showRouteBeheer&&<RouteBeherenModal routes={routes} clients={clients} onRenameRoute={renameRoute} onDeleteRoute={deleteRoute} onClose={()=>setShowRouteBeheer(false)}/>}
      {dubbelklikRec&&<KlantDetailModal client={dubbelklikRec.client} record={dubbelklikRec.record} records={records} onClose={()=>setDubbelklikRec(null)} onEdit={dubbelklikRec.client?()=>{setEditKlant(dubbelklikRec.client);setShowKlantModal(true);}:null}/>}
      {showImport&&<ExcelImportModal onImport={handleImport} onClose={()=>setShowImport(false)} bestaandeNamen={clients.map(c=>c.naam)}/>}
      {showBackup&&<BackupModal records={records} clients={clients} routes={routes} onRestore={handleRestore} onClose={()=>setShowBackup(false)}/>}
      {showWaInst&&<WhatsAppModal instellingen={waInstellingen} onSave={s=>{setWaInstellingen(s);setShowWaInst(false);}} onClose={()=>setShowWaInst(false)}/>}
      {waVerstuurRec&&<WhatsAppVerstuurModal rec={waVerstuurRec} clientMap={clientMap} waInstellingen={waInstellingen} onSend={(id,status)=>toggleStatus(id,status)} onClose={()=>setWaVerstuurRec(null)}/>}
      {bevestigVerwijder&&<BevestigModal tekst={bevestigVerwijder.tekst} jaLabel={bevestigVerwijder.jaLabel} onJa={bevestigVerwijder.onJa} onNee={()=>setBevestigVerwijder(null)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
